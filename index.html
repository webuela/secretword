<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Words — find words hidden in any text</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F7F9;
    --ink:#16233A;
    --azulejo:#2E5FA3;
    --azulejo-deep:#1E4176;
    --marigold:#D9A424;
    --tile:#FFFFFF;
    --tile-edge:#C9D4DE;
    --muted:#6B7A8C;
    --ok:#2F7D4F;
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
    html{scroll-behavior:auto}
  }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Source Sans 3",system-ui,sans-serif;
    font-size:16px;
    line-height:1.55;
    min-height:100vh;
  }
  a{color:var(--azulejo)}

  header{
    border-bottom:3px solid var(--ink);
    background:
      linear-gradient(0deg, rgba(46,95,163,.06), rgba(46,95,163,.06)),
      var(--paper);
    padding:24px 20px 20px;
  }
  .wrap{max-width:1060px;margin:0 auto;padding:0 4px}
  .brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;justify-content:space-between}
  h1{
    font-family:"Fraunces",serif;
    font-weight:900;
    font-size:clamp(1.7rem,4.5vw,2.6rem);
    letter-spacing:-.01em;
  }
  h1 .es{color:var(--azulejo)}
  .tagline{color:var(--muted);font-size:.95rem;max-width:60ch;margin-top:4px}
  .uilang{display:flex;align-items:center;gap:7px;font-size:.85rem;color:var(--muted)}

  main{max-width:1060px;margin:0 auto;padding:26px 20px 130px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:26px}
  @media (max-width:820px){.grid{grid-template-columns:1fr}}

  section.card{
    background:#fff;
    border:1px solid var(--tile-edge);
    border-radius:var(--radius);
    padding:20px;
    box-shadow:0 1px 0 var(--tile-edge);
  }
  h2{
    font-family:"Fraunces",serif;
    font-weight:600;
    font-size:1.15rem;
    margin-bottom:12px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  h2 .num{
    font-family:"IBM Plex Mono",monospace;
    font-size:.8rem;font-weight:600;
    color:var(--azulejo);
    border:1px solid var(--azulejo);
    border-radius:6px;padding:1px 7px;
  }

  textarea{
    width:100%;
    min-height:140px;
    resize:vertical;
    font-family:"Fraunces",serif;
    font-size:1.05rem;
    line-height:1.6;
    padding:12px 14px;
    border:1px solid var(--tile-edge);
    border-radius:var(--radius);
    background:var(--paper);
    color:var(--ink);
  }
  textarea:focus-visible,button:focus-visible,select:focus-visible,input:focus-visible{
    outline:3px solid var(--marigold);outline-offset:2px;
  }

  .controls{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;align-items:center}
  label.opt{display:flex;align-items:center;gap:7px;font-size:.92rem;color:var(--ink)}
  select{
    font:inherit;padding:6px 10px;border-radius:8px;
    border:1px solid var(--tile-edge);background:#fff;color:var(--ink);
  }
  button{
    font:inherit;font-weight:700;cursor:pointer;
    border-radius:var(--radius);
    padding:9px 18px;border:2px solid var(--ink);
    background:var(--ink);color:#fff;
    transition:transform .08s ease, background .15s ease;
  }
  button:hover{background:var(--azulejo-deep);border-color:var(--azulejo-deep)}
  button:active{transform:translateY(1px)}
  button.ghost{background:#fff;color:var(--ink)}
  button.ghost:hover{background:var(--paper)}
  button.small{padding:5px 12px;font-size:.85rem;border-width:1.5px}
  button:disabled{opacity:.45;cursor:not-allowed}

  /* Signature: letterpress tile rack */
  .rack{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .tile{
    position:relative;
    font-family:"IBM Plex Mono",monospace;
    font-weight:600;font-size:1.05rem;
    width:40px;height:44px;
    display:flex;align-items:center;justify-content:center;
    background:var(--tile);
    border:1px solid var(--tile-edge);
    border-bottom:3px solid var(--tile-edge);
    border-radius:7px;
    text-transform:uppercase;
    transition:background .12s, border-color .12s, transform .12s;
  }
  .tile .cnt{
    position:absolute;bottom:2px;right:4px;
    font-size:.58rem;color:var(--muted);font-weight:400;
  }
  .tile.lit{
    background:var(--azulejo);
    border-color:var(--azulejo-deep);
    color:#fff;
    transform:translateY(-2px);
  }
  .tile.lit .cnt{color:#cfe0f5}
  .rack-empty{color:var(--muted);font-size:.92rem}

  .results{margin-top:4px}
  .word-list{list-style:none;display:flex;flex-direction:column;gap:8px;max-height:430px;overflow:auto;padding-right:4px}
  .word-item{
    display:flex;align-items:center;gap:12px;
    border:1px solid var(--tile-edge);
    border-radius:var(--radius);
    padding:9px 12px;
    background:#fff;
  }
  .word-item .w{
    font-family:"Fraunces",serif;
    font-weight:600;font-size:1.12rem;
    text-transform:uppercase;letter-spacing:.03em;
  }
  .word-item .tr{color:var(--muted);font-size:.92rem;flex:1}
  .word-item button{margin-left:auto;white-space:nowrap}
  .word-item.picked{border-color:var(--ok)}
  .word-item.picked .w{color:var(--ok)}

  .hint{color:var(--muted);font-size:.88rem;margin-top:10px}
  .filterbar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .filterbar input{
    font:inherit;padding:6px 10px;border-radius:8px;flex:1;min-width:140px;
    border:1px solid var(--tile-edge);background:var(--paper);color:var(--ink);
  }

  /* Collection bar */
  .collection{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--ink);color:#fff;
    border-top:3px solid var(--marigold);
    padding:12px 20px;
    z-index:10;
  }
  .collection .wrap{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .collection h3{
    font-family:"Fraunces",serif;font-weight:600;font-size:1rem;white-space:nowrap;
  }
  .chips{display:flex;gap:8px;flex-wrap:wrap;flex:1;max-height:84px;overflow:auto}
  .chip{
    display:inline-flex;align-items:center;gap:7px;
    background:#243550;border:1px solid #3a4f73;
    border-radius:999px;padding:4px 6px 4px 12px;
    font-size:.9rem;
  }
  .chip .n{font-family:"IBM Plex Mono",monospace;font-size:.72rem;color:var(--marigold)}
  .chip b{text-transform:uppercase;font-weight:600;letter-spacing:.03em}
  .chip .lg{font-size:.7rem;color:#9db2d1;text-transform:uppercase}
  .chip button{
    border:none;background:transparent;color:#9db2d1;padding:0 6px;font-size:1rem;font-weight:400;
  }
  .chip button:hover{color:#fff;background:transparent}
  .collection .empty{color:#9db2d1;font-size:.9rem}

  /* Proverb dialog */
  dialog{
    border:2px solid var(--ink);border-radius:14px;
    max-width:560px;width:calc(100% - 40px);
    padding:26px;background:#fff;color:var(--ink);
  }
  dialog::backdrop{background:rgba(22,35,58,.55)}
  dialog h2{margin-bottom:14px}
  .refran{
    font-family:"Fraunces",serif;font-size:1.3rem;font-weight:600;
    border-left:4px solid var(--marigold);
    padding:10px 16px;margin:14px 0;
    background:var(--paper);border-radius:0 var(--radius) var(--radius) 0;
  }
  .refran small{display:block;font-family:"Source Sans 3",sans-serif;font-weight:400;font-size:.85rem;color:var(--muted);margin-top:6px}
  .dialog-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;align-items:center}
  .dialog-actions label{font-size:.9rem;color:var(--muted);display:flex;gap:6px;align-items:center}

  footer{
    max-width:1060px;margin:40px auto 0;padding:0 20px;
    color:var(--muted);font-size:.85rem;
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="brand">
      <h1>Hidden <span class="es">Words</span></h1>
      <label class="uilang"><span data-i18n="uiLang">Interface</span>

          <option value="en">English</option>
          <option value="ru">Русский</option>
          <option value="es">Español</option>
        </select>
      </label>
    </div>
    <p class="tagline" data-i18n="tagline"></p>
  </div>
</header>

<main>
  <div class="grid">

    <!-- INPUT -->
    <section class="card">
      <h2><span class="num" id="poemNum"></span> <span data-i18n="poemText"></span></h2>
      <textarea id="poemText" placeholder="Á dormir va la rosa&#10;De los rosales;&#10;A dormir va mi niño,&#10;Porque ya es tarde." aria-label="Poem text"></textarea>

      <div class="controls">
        <label class="opt"><span data-i18n="wordLang"></span>
          <select id="lang">
            <option value="en" selected>English</option>
            <option value="ru">Русский</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
          </select>
        </label>
        <label class="opt"><span data-i18n="mode"></span>
          <select id="mode">
            <option value="presence" data-i18n="modeFree" selected></option>
            <option value="strict" data-i18n="modeStrict"></option>
          </select>
        </label>
        <button id="analyze" data-i18n="analyze"></button>
      </div>

      <h2 style="margin-top:22px" data-i18n="lettersHead"></h2>
      <div class="rack" id="rack"><span class="rack-empty" data-i18n="rackEmpty"></span></div>
      <p class="hint" data-i18n="hoverHint"></p>
    </section>

    <!-- RESULTS -->
    <section class="card results">
      <h2><span data-i18n="foundHead"></span> <span class="num" id="foundCount">0</span></h2>
      <div class="filterbar">
        <input id="filter" type="search" aria-label="Filter words">
        <label class="opt"><span data-i18n="minLen"></span>
          <select id="minLen">
            <option>3</option><option selected>4</option><option>5</option><option>6</option>
          </select>
        </label>
      </div>
      <ul class="word-list" id="words"></ul>
      <p class="hint" id="resultsHint"></p>
    </section>

  </div>
</main>

<!-- COLLECTION -->
<div class="collection" role="region" aria-label="Word collection">
  <div class="wrap">
    <h3 data-i18n="collection"></h3>
    <div class="chips" id="chips"></div>
    <button class="small ghost" id="exportBtn" style="border-color:#fff;color:#fff" disabled data-i18n="export"></button>
    <button class="small" id="proverbBtn" style="background:var(--marigold);border-color:var(--marigold);color:var(--ink)" disabled data-i18n="proverb"></button>
  </div>
</div>

<!-- PROVERB DIALOG -->
<dialog id="proverbDialog">
  <h2 data-i18n="proverbTitle"></h2>
  <p><span data-i18n="proverbWordsLabel"></span> <b id="proverbWords"></b></p>
  <div class="refran" id="refranBox"></div>
  <div class="dialog-actions">
    <label><span data-i18n="proverbLang"></span>
      <select id="proverbLang"></select>
    </label>
    <button id="anotherProverb" data-i18n="another"></button>
    <button class="ghost" id="closeDialog" data-i18n="close"></button>
  </div>
</dialog>

<footer>
  <p data-i18n="footer"></p>
</footer>

/* ============================================================
   1. LANGUAGES: alphabets, dictionaries, proverb templates
   Gloss format: "english / русский" (EN words glossed in RU,
   RU words glossed in EN). Extend freely.
   ============================================================ */
const RU2LAT = {
"а":"a","б":"b","в":"v","г":"g","д":"d","е":"e","ё":"e","ж":"zh","з":"z","и":"i","й":"y",
"к":"k","л":"l","м":"m","н":"n","о":"o","п":"p","р":"r","с":"s","т":"t","у":"u","ф":"f",
"х":"j","ц":"ts","ч":"ch","ш":"sh","щ":"sh","ъ":"","ы":"y","ь":"","э":"e","ю":"yu","я":"ya"
};
const LAT2CYR = {
"a":"а","b":"б","c":"к","d":"д","e":"е","f":"ф","g":"г","h":"х","i":"и","j":"й","k":"к",
"l":"л","m":"м","n":"н","o":"о","p":"п","q":"к","r":"р","s":"с","t":"т","u":"у","v":"в",
"w":"в","x":"кс","y":"ы","z":"з","ñ":"н"
};

const CYR = /^[а-яё]$/;
const LAT_BASE = /^[a-z]$/;

function stripDiacritics(ch){
  const special = {"ß":"ss","œ":"oe","æ":"ae"};
  if (special[ch]) return special[ch];
  return ch.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

/* fold a single character to the game alphabet of a language */
function foldChar(ch, lang){
  if (lang === "ru"){
    if (CYR.test(ch)) return ch === "ё" ? "е" : ch;
    return null;
  }
  if (lang === "es" && ch === "ñ") return "ñ";
  const s = stripDiacritics(ch);
  let out = "";
  for (const c of s){ if (LAT_BASE.test(c)) out += c; }
  return out || null;
}

/* ============================================================
   2. LETTER LOGIC
   ============================================================ */
function extractLetters(text, lang){
  const counts = new Map();
  const order = [];
  const lower = text.toLowerCase();
  const isRuTarget = lang === "ru";
  for (const raw of lower){
    let pieces = [];
    if (!isRuTarget && CYR.test(raw)){
      const t = RU2LAT[raw] || "";
      for (const c of t){
        const f = foldChar(c, lang);
        if (f) pieces.push(...f);
      }
    } else if (isRuTarget && !CYR.test(raw)){
      const base = stripDiacritics(raw);
      for (const c of base){
        const t = LAT2CYR[c];
        if (t) pieces.push(...t);
      }
    } else {
      const f = foldChar(raw, lang);
      if (f) pieces.push(...f);
    }
    for (const p of pieces){
      if (!counts.has(p)){ counts.set(p, 0); order.push(p); }
      counts.set(p, counts.get(p) + 1);
    }
  }
  order.sort();
  return {counts, order};
}

function wordLetters(word, lang){
  const out = [];
  for (const raw of word.toLowerCase()){
    const f = foldChar(raw, lang);
    if (f) out.push(...f);
  }
  return out;
}

function canBuild(word, counts, lang, strict){
  const need = wordLetters(word, lang);
  if (need.length === 0) return false;
  if (!strict) return need.every(ch => counts.has(ch));
  const used = new Map();
  for (const ch of need){
    const have = counts.get(ch) || 0;
    const u = (used.get(ch) || 0) + 1;
    if (u > have) return false;
    used.set(ch, u);
  }
  return true;
}

/* ============================================================
   3. STATE & UI
   ============================================================ */
const $ = id => document.getElementById(id);
const state = {
  ui: "en",
  poemNo: 1,
  letters: null,
  lang: "en",
  found: [],
  collection: []   // [{word, tr, poem, lang}]
};

function t(key){ return (I18N[state.ui] && I18N[state.ui][key]) || I18N.en[key] || key; }

function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  $("filter").placeholder = t("filterPh");
  renderPoemNum();
  renderChips();
  if (state.letters) renderWords(); else $("resultsHint").textContent = t("hintStart");
  document.documentElement.lang = state.ui;
}

/* Optional persistence (works on GitHub Pages; silently skipped elsewhere). */
function save(){
  try {
    localStorage.setItem("pdp-state", JSON.stringify({
      no: state.poemNo, items: state.collection, ui: state.ui
    }));
  } catch(e){}
}
function load(){
  try {
    const raw = localStorage.getItem("pdp-state");
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d && Array.isArray(d.items)){
      state.collection = d.items;
      state.poemNo = d.no || (d.items.length + 1);
      if (d.ui && I18N[d.ui]) state.ui = d.ui;
    }
  } catch(e){}
}

function renderPoemNum(){ $("poemNum").textContent = t("inPoem") + " №" + state.poemNo; }

/* Translation policy: show a gloss only when the word language differs
   from the interface language. Dual glosses ("english / русский") are
   trimmed to the interface language when possible. */
function glossFor(tr, wordLang){
  if (!tr) return "";
  if (wordLang === state.ui) return "";
  const parts = tr.split(" / ");
  if (parts.length === 2){
    return state.ui === "ru" ? parts[1] : parts[0];
  }
  return tr;
}

function renderRack(){
  const rack = $("rack");
  rack.innerHTML = "";
  if (!state.letters || state.letters.order.length === 0){
    rack.innerHTML = '<span class="rack-empty">' + t("rackEmpty") + "</span>";
    return;
  }
  for (const ch of state.letters.order){
    const div = document.createElement("div");
    div.className = "tile";
    div.dataset.letter = ch;
    div.innerHTML = ch + '<span class="cnt">' + state.letters.counts.get(ch) + "</span>";
    rack.appendChild(div);
  }
}

function highlightWord(word){
  const set = word ? new Set(wordLetters(word, state.lang)) : null;
  document.querySelectorAll(".tile").forEach(tl => {
    tl.classList.toggle("lit", !!(set && set.has(tl.dataset.letter)));
  });
}

function analyze(){
  const text = $("poemText").value.trim();
  if (!text){ $("resultsHint").textContent = t("hintEmptyText"); return; }
  state.lang = $("lang").value;
  const strict = $("mode").value === "strict";
  state.letters = extractLetters(text, state.lang);
  const dict = LANGS[state.lang].dict;
  const minLen = parseInt($("minLen").value, 10);

  state.found = dict
    .filter(([w]) => wordLetters(w, state.lang).length >= minLen)
    .filter(([w]) => canBuild(w, state.letters.counts, state.lang, strict))
    .map(([w, tr]) => ({word: w, tr}))
    .sort((a, b) => b.word.length - a.word.length || a.word.localeCompare(b.word));

  renderRack();
  renderWords();
}

function renderWords(){
  const list = $("words");
  const q = $("filter").value.trim().toLowerCase();
  list.innerHTML = "";
  const inCollection = new Set(state.collection.map(c => c.word + "|" + c.lang));
  let shown = 0;

  for (const item of state.found){
    const gloss = glossFor(item.tr, state.lang);
    if (q && !item.word.includes(q) && !gloss.toLowerCase().includes(q)) continue;
    shown++;
    const li = document.createElement("li");
    const picked = inCollection.has(item.word + "|" + state.lang);
    li.className = "word-item" + (picked ? " picked" : "");
    li.innerHTML =
      '<span class="w">' + item.word + "</span>" +
      '<span class="tr">' + gloss + "</span>";
    const btn = document.createElement("button");
    btn.className = "small";
    btn.textContent = picked ? t("added") : t("add");
    btn.disabled = picked;
    btn.addEventListener("click", () => addToCollection(item));
    li.appendChild(btn);
    li.addEventListener("mouseenter", () => highlightWord(item.word));
    li.addEventListener("mouseleave", () => highlightWord(null));
    li.addEventListener("focusin", () => highlightWord(item.word));
    li.addEventListener("focusout", () => highlightWord(null));
    list.appendChild(li);
  }

  $("foundCount").textContent = shown;
  $("resultsHint").textContent = shown
    ? t("hintAdded")
    : (state.letters ? t("hintNone") : t("hintStart"));
}

function addToCollection(item){
  state.collection.push({word: item.word, tr: item.tr, poem: state.poemNo, lang: state.lang});
  state.poemNo++;
  renderPoemNum();
  save();
  renderChips();
  renderWords();
}

function removeFromCollection(idx){
  state.collection.splice(idx, 1);
  save();
  renderChips();
  renderWords();
}

function collectionByLang(){
  const groups = {};
  for (const c of state.collection){
    (groups[c.lang] = groups[c.lang] || []).push(c);
  }
  return groups;
}

function renderChips(){
  const chips = $("chips");
  chips.innerHTML = "";
  if (state.collection.length === 0){
    chips.innerHTML = '<span class="empty">' + t("collectionEmpty") + "</span>";
  } else {
    state.collection.forEach((c, i) => {
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.innerHTML =
        '<span class="n">№' + c.poem + "</span><b>" + c.word + "</b>" +
        '<span class="lg">' + c.lang + "</span>";
      const x = document.createElement("button");
      x.setAttribute("aria-label", "Remove " + c.word);
      x.textContent = "×";
      x.addEventListener("click", () => removeFromCollection(i));
      chip.appendChild(x);
      chips.appendChild(chip);
    });
  }
  const groups = collectionByLang();
  const okLangs = Object.keys(groups).filter(l => groups[l].length >= 2 && TEMPLATES[l]);
  $("proverbBtn").disabled = okLangs.length === 0;
  $("proverbBtn").title = okLangs.length ? "" : t("proverbNeed");
  $("exportBtn").disabled = state.collection.length === 0;
}

/* ============================================================
   4. PROVERB
   ============================================================ */
function pickTwo(arr){
  const i = Math.floor(Math.random() * arr.length);
  let j = Math.floor(Math.random() * (arr.length - 1));
  if (j >= i) j++;
  return [arr[i], arr[j]];
}

function firstGloss(c){
  if (!c.tr) return c.word;
  return c.tr.split("/")[0].split(",")[0].trim();
}

function fillProverbLangSelect(){
  const groups = collectionByLang();
  const okLangs = Object.keys(groups).filter(l => groups[l].length >= 2 && TEMPLATES[l]);
  const sel = $("proverbLang");
  sel.innerHTML = "";
  for (const l of okLangs){
    const opt = document.createElement("option");
    opt.value = l;
    opt.textContent = LANGS[l].name;
    sel.appendChild(opt);
  }
  return okLangs;
}

function makeProverb(){
  const lang = $("proverbLang").value;
  const groups = collectionByLang();
  const words = groups[lang] || [];
  if (words.length < 2) return;
  const [a, b] = pickTwo(words);
  const tpls = TEMPLATES[lang];
  const [tpl, glossTpl] = tpls[Math.floor(Math.random() * tpls.length)];
  const native = tpl.replace("{A}", a.word).replace("{B}", b.word);
  const gloss = glossTpl.replace("{a}", firstGloss(a)).replace("{b}", firstGloss(b));
  $("proverbWords").textContent = words.map(c => c.word).join(", ");
  $("refranBox").innerHTML = "«" + native + "»<small>" + gloss + "</small>";
}

/* ============================================================
   5. EXPORT
   ============================================================ */
function exportCollection(){
  const lines = state.collection.map(c => {
    const gloss = glossFor(c.tr, c.lang);
    return t("inPoem") + " №" + c.poem + ": " + c.word.toUpperCase() +
      (gloss ? " — " + gloss : "") + " [" + c.lang + "]";
  });
  const blob = new Blob([lines.join("\n")], {type: "text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "hidden-words.txt";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

/* ============================================================
   6. WIRING
   ============================================================ */
$("analyze").addEventListener("click", analyze);
$("filter").addEventListener("input", renderWords);
$("minLen").addEventListener("change", () => { if (state.letters) analyze(); });
$("lang").addEventListener("change", () => { if ($("poemText").value.trim()) analyze(); });
$("mode").addEventListener("change", () => { if (state.letters) analyze(); });
$("exportBtn").addEventListener("click", exportCollection);
$("proverbBtn").addEventListener("click", () => {
  const ok = fillProverbLangSelect();
  if (!ok.length) return;
  makeProverb();
  $("proverbDialog").showModal();
});
$("proverbLang").addEventListener("change", makeProverb);
$("anotherProverb").addEventListener("click", makeProverb);
$("closeDialog").addEventListener("click", () => $("proverbDialog").close());
$("uiLang").addEventListener("change", e => {
  state.ui = e.target.value;
  save();
  applyI18n();
});

/* Init */
load();
$("uiLang").value = state.ui;
applyI18n();
</script>
</body>
</html>
